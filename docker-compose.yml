name: projero-area-cliente

services:
  ac_web_cliente:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ac_web_cliente
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/storage
      - /home/server/projects:/home/server/projects
    environment:
      APP_CONTEXT: cliente
      DB_HOST: ac_postgres
      DB_PORT: 5432
      DB_NAME: ac_db
      DB_USER: ac_user
      DB_PASS: ac_pass
      STORAGE_ROOT: /storage
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://api-sandbox.asaas.com/v3}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      ASAAS_WALLET_ID: ${ASAAS_WALLET_ID:-}
      ASAAS_WEBHOOK_PUBLIC_URL: ${ASAAS_WEBHOOK_PUBLIC_URL:-https://clientes.koddahub.com.br/api/webhooks/asaas}
      ASAAS_CHECKOUT_CALLBACK_ENABLED: ${ASAAS_CHECKOUT_CALLBACK_ENABLED:-false}
      MAIL_TEST_COPY_TO: ${MAIL_TEST_COPY_TO:-arielrluz@gmail.com}
    depends_on:
      - ac_postgres
      - ac_redis
    restart: unless-stopped

  ac_nginx_cliente:
    image: nginx:alpine
    container_name: ac_nginx_cliente
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www
      - ./nginx/cliente.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ac_web_cliente
    restart: unless-stopped

  ac_crm_next:
    build:
      context: .
      dockerfile: docker/crm-next/Dockerfile
    container_name: ac_crm_next
    ports:
      - "8082:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ac_user:ac_pass@ac_postgres:5432/ac_db?schema=public
      CRM_ADMIN_EMAIL: admin@koddahub.local
      CRM_ADMIN_PASSWORD: admin123
      CRM_ADMIN_SESSION_TOKEN: koddahub-crm-v2-session
      CLIENT_PROJECTS_ROOT: /home/server/projects/clientes
      PREVIEW_BASE_URL: https://preview.koddahub.com.br
      PORTAL_BASE_URL: https://cliente.koddahub.com.br
      VSCODE_SSH_HOST: ssh.koddahub.com.br
      VSCODE_WEB_BASE_URL: ""
      CRM_PUBLIC_BASE_URL: https://koddacrm.koddahub.com.br
      STORAGE_ROOT: /storage
    volumes:
      - ./storage:/storage
      - /home/server/projects:/home/server/projects
    depends_on:
      - ac_postgres
    labels:
      icon: https://koddahub.com.br/assets/logo/koddahub-logo-v2.png
    restart: unless-stopped

  ac_postgres:
    image: postgres:16
    container_name: ac_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ac_db
      POSTGRES_USER: ac_user
      POSTGRES_PASSWORD: ac_pass
    ports:
      - "5434:5432"
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d

  ac_redis:
    image: redis:7-alpine
    container_name: ac_redis
    ports:
      - "6381:6379"
    restart: unless-stopped

  ac_worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ac_worker
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/storage
      - /home/server/projects:/home/server/projects
    environment:
      DB_HOST: ac_postgres
      DB_PORT: 5432
      DB_NAME: ac_db
      DB_USER: ac_user
      DB_PASS: ac_pass
      STORAGE_ROOT: /storage
      MAIL_MODE: ${MAIL_MODE:-smtp}
      MAIL_FROM: ${MAIL_FROM:-clientes@koddahub.com.br}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-KoddaHub}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-clientes@koddahub.com.br}
      MAIL_TEST_COPY_TO: ${MAIL_TEST_COPY_TO:-arielrluz@gmail.com}
      SMTP_HOST: ${SMTP_HOST:-mail.koddahub.com.br}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_ENCRYPTION: ${SMTP_ENCRYPTION:-ssl}
      SMTP_HELO: ${SMTP_HELO:-mail.koddahub.com.br}
      SMTP_ALLOW_SELF_SIGNED: ${SMTP_ALLOW_SELF_SIGNED:-false}
      SMTP_USER: ${SMTP_USER:-clientes@koddahub.com.br}
      SMTP_PASS: ${SMTP_PASS:-}
      CRM_ADMIN_SESSION_TOKEN: ${CRM_ADMIN_SESSION_TOKEN:-koddahub-crm-v2-session}
      CRM_RECONCILE_URL: ${CRM_RECONCILE_URL:-http://ac_crm_next:3000/api/automation/reconcile}
      CRM_BACKFILL_INTERVAL_SECONDS: ${CRM_BACKFILL_INTERVAL_SECONDS:-1800}
      CRM_RECONCILE_INTERVAL_SECONDS: ${CRM_RECONCILE_INTERVAL_SECONDS:-300}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://api-sandbox.asaas.com/v3}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      ASAAS_WALLET_ID: ${ASAAS_WALLET_ID:-}
      ASAAS_WEBHOOK_PUBLIC_URL: ${ASAAS_WEBHOOK_PUBLIC_URL:-https://clientes.koddahub.com.br/api/webhooks/asaas}
    command: ["php", "worker/worker.php"]
    depends_on:
      - ac_postgres
      - ac_redis
    labels:
      icon: https://koddahub.com.br/assets/logo/koddahub-logo-v2.png
    restart: unless-stopped

  ac_preview:
    image: nginx:alpine
    container_name: ac_preview
    ports:
      - "8085:80"
    volumes:
      - /home/server/projects/clientes:/usr/share/nginx/html:ro
      - ./nginx/preview.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

x-casaos:
  author: self
  category: self
  hostname: koddacrm.koddahub.com.br
  icon: https://koddahub.com.br/assets/logo/koddahub-logo-v2.png
  index: /
  is_uncontrolled: false
  port_map: ""
  scheme: https
  title:
    custom: KoddaCRM V2
